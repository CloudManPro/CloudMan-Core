name: "CloudMan Engine: Lambda Sync"

on:
  workflow_call:
    inputs:
      direction: { type: string, required: true }
      region: { type: string, default: "us-east-1" }
      role_arn: { type: string, required: true }
      resources_json: { type: string, required: true }
      target_repo: { type: string, required: true }
      target_branch: { type: string, default: "main" }
      git_token: { type: string, required: true }

  workflow_dispatch:
    inputs:
      direction: { required: true }
      region: { default: "us-east-1" }
      role_arn: { required: true }
      resources_json: { required: true }
      target_repo: { required: true }
      target_branch: { default: "main" }
      git_token: { required: true }

permissions:
  id-token: write
  contents: write

jobs:
  sync-engine:
    runs-on: ubuntu-latest
    steps:
      - name: 🛡️ Mask Token
        run: echo "::add-mask::${{ inputs.git_token }}"

      # 1. Baixa ESTE repositório (CloudMan Engine) para a pasta '.engine'
      # Isso traz a sua nova pasta /scripts/ para a máquina
      - name: 📥 Checkout Engine Scripts
        uses: actions/checkout@v4
        with:
          path: '.engine'

      # 2. Baixa o repositório do cliente para a raiz ('.')
      - name: 📥 Checkout Target Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.target_branch }}
          token: ${{ inputs.git_token }}
          path: '.'

      - name: 🔑 Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.region }}
          role-session-name: CloudManSyncSession

      # 3. Roda o script Node nativamente chamando o orquestrador
      - name: ⚡ Process Resources (Smart Engine)
        env:
          INPUT_DIRECTION: ${{ inputs.direction }}
          INPUT_RESOURCES: ${{ inputs.resources_json }}
          INPUT_REGION: ${{ inputs.region }}
        run: node .engine/scripts/orchestrator.js

      - name: 📝 Commit Changes (Push/Create Only)
        if: inputs.direction == 'push' || inputs.direction == 'create'
        run: |
          git config user.name "CloudMan Bot"
          git config user.email "bot@cloudman.pro"
          
          git add .
          
          if ! git diff --staged --quiet; then
            git commit -m "cloudman(sync): Sync code from Cloud [skip ci]"
            git push
            echo "✅ Changes pushed successfully."
          else
            echo "✅ No changes to commit."
          fi
